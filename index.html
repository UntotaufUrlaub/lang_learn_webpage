<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Conversation Sparring</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #setup {
    max-width: 500px;
    margin: auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  #setup h1 { text-align: center; font-size: 1.4rem; color: #e94560; }
  #setup label { font-size: 0.85rem; color: #aaa; }
  #setup input {
    width: 100%;
    padding: 0.6rem;
    background: #16213e;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 0.95rem;
  }
  #setup button {
    padding: 0.7rem;
    background: #e94560;
    border: none;
    border-radius: 4px;
    color: white;
    font-size: 1rem;
    cursor: pointer;
  }
  #setup button:hover { background: #c73650; }

  #chat-container {
    display: none;
    flex-direction: column;
    height: 100vh;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  .msg {
    max-width: 80%;
    padding: 0.7rem 1rem;
    border-radius: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #16213e;
    border: 1px solid #333;
  }
  .msg.user {
    align-self: flex-end;
    background: #0f3460;
    border: 1px solid #1a4a7a;
  }
  .msg.system-info {
    align-self: center;
    background: #2a1a3e;
    border: 1px solid #4a2a6e;
    font-size: 0.85rem;
    color: #caa;
    max-width: 90%;
  }
  #input-area {
    display: flex;
    padding: 0.8rem;
    gap: 0.5rem;
    background: #16213e;
    border-top: 1px solid #333;
  }
  #user-input {
    flex: 1;
    padding: 0.6rem;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 1rem;
  }
  #send-btn {
    padding: 0.6rem 1.2rem;
    background: #e94560;
    border: none;
    border-radius: 4px;
    color: white;
    cursor: pointer;
    font-size: 1rem;
  }
  #send-btn:hover { background: #c73650; }
  #send-btn:disabled { background: #555; cursor: not-allowed; }
  #new-round-btn {
    padding: 0.6rem 0.8rem;
    background: #333;
    border: 1px solid #555;
    border-radius: 4px;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 0.85rem;
  }
  #new-round-btn:hover { background: #444; }
  #save-btn {
    padding: 0.6rem 0.8rem;
    background: #1a4a2e;
    border: 1px solid #2a6a3e;
    border-radius: 4px;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 0.85rem;
  }
  #save-btn:hover { background: #2a5a3e; }
  #rating-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #rating-overlay.active { display: flex; }
  #rating-box {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1.5rem;
    text-align: center;
    max-width: 300px;
  }
  #rating-box p { margin-bottom: 1rem; }
  .rating-stars { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem; }
  .rating-stars button {
    background: none;
    border: 1px solid #555;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 1.2rem;
    width: 2.5rem;
    height: 2.5rem;
    cursor: pointer;
  }
  .rating-stars button:hover, .rating-stars button.selected { background: #e94560; border-color: #e94560; }
  #info-bar {
    display: flex;
    justify-content: space-between;
    padding: 0.3rem 1rem;
    background: #0f0f1e;
    border-bottom: 1px solid #333;
    font-size: 0.75rem;
    color: #666;
  }
  #student-word-hint { color: #e94560; }
  #user-input:disabled { background: #2a2a2a; }
  .spinner {
    display: inline-block;
    width: 1.2em;
    height: 1.2em;
    border: 2px solid #555;
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 0.4em;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="setup">
  <h1>Japanese Conversation Sparring</h1>
  <div>
    <label>OpenRouter API Key</label>
    <input type="password" id="api-key" placeholder="sk-or-..." />
  </div>
  <div>
    <label>Model (OpenRouter model ID)</label>
    <input type="text" id="model-id" value="google/gemini-2.5-flash-preview" />
  </div>
  <button id="start-btn">Start</button>
</div>

<div id="chat-container">
  <div id="info-bar">
    <span id="student-word-hint"></span>
    <span id="token-bar">In: <span id="tokens-in">0</span> | Out: <span id="tokens-out">0</span> | ~<span id="cost-estimate">0.000</span> EUR</span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="Type in Japanese (kana)..." disabled />
    <button id="send-btn" disabled>Send</button>
    <button id="new-round-btn" title="New Round">New</button>
    <button id="save-btn" title="Save conversation">Save</button>
  </div>
</div>

<div id="rating-overlay">
  <div id="rating-box">
    <p>Rate this conversation</p>
    <div class="rating-stars">
      <button data-rating="1">1</button>
      <button data-rating="2">2</button>
      <button data-rating="3">3</button>
      <button data-rating="4">4</button>
      <button data-rating="5">5</button>
    </div>
    <button id="rating-cancel" style="background:#333;border:1px solid #555;color:#e0e0e0;padding:0.4rem 1rem;border-radius:4px;cursor:pointer;">Cancel</button>
  </div>
</div>

Speaker A speaks first.

A: このみせの たべものは おいしいですか。
B: [points at the menu] ええ、おいしいですよ。さかなの りょうりが いいですよ。
A: さかなですか。いくらですか。
B: 900えんです。きょうの さかなは とても いいですよ。
A: きょうの さかな？ すみません、わかりません。
B: きょうの さかなは あたらしいです。おいしいですよ。
A: ああ、わかりました。900えんは ちょっと たかいです。わたしは がくせいですから。
B: そうですか。じゃ、パンと コーヒーは どうですか。パンは 300えんですよ。
A: いいですね。コーヒーを のみます と パンを たべます。
B: コーヒーを のみます「と」？
A: あ、すみません。コーヒーを のみます。そして、パンを たべます。
B: いいですね。わたしも コーヒーを のみますよ。

Targets:
- [x] Speaker A's word: たかい — used when reacting to the price
- [x] Speaker B's word: コーヒー — used when suggesting a cheaper option
- [x] Grammar NはNです (Speaker A): わたしは がくせいです

Feedback:
- Speaker A used と to connect two sentences (コーヒーを のみます と パンを たべます). と connects nouns, not sentences. Use そして or それから for sentences. Self-corrected after Speaker B's clarification. [Low — corrected]
- Speaker A asked for clarification on きょうの さかな appropriately using すみません、わかりません.
- Natural conversation flow, good use of いくらですか and ちょっと.`,

  `EXAMPLE CONVERSATION (for format and tone reference):
Secret targets: Speaker A's word: いっしょに (together), Speaker B's word: としょかん (library), Grammar: NはNです assigned to Speaker B.

Scenario:
Speaker A (the student): A newcomer who recently moved to this neighborhood.
Speaker B (the AI): A friendly neighbor Speaker A has met a few times.
It's Saturday morning. Speaker A is walking near the station and runs into Speaker B. Speaker A has a lot of studying to do, but Speaker A's apartment is noisy.
Speaker A's goal: Find out if there is a quiet place nearby to study this weekend.
Speaker B speaks first.

[waves at Speaker A from across the street]
B: あ、おはようございます！いい てんきですね。

A: おはようございます。こんしゅう、たくさん べんきょうしますが、うちは しずかじゃ ありません…
B: ああ、そうですか。えきの ちかくに いい ところが ありますよ。あそこは としょかんです。
A: としょかんですか。なんじから なんじまでですか。
B: ごぜん 9じから ごご 5じまでですよ。
A: としょかんは どこですか。
B: としょかんは えきの みぎの おおきい ビルの となりに ありますよ。
A: すみません、わかりません。
B: えきの みぎです。おおきい ビルの となりです。
A: ああ、わかりました。いいですね。ともだちと いしょに いきます。
B: いいですね。

Targets:
- [x] Speaker A's word: いっしょに — used when saying they'll go with a friend
- [x] Speaker B's word: としょかん — used when suggesting a study spot
- [x] Grammar NはNです (Speaker B): あそこは としょかんです

Feedback:
- Speaker A asked for clarification on a long location description appropriately using すみません、わかりません.
- Spelling: いしょに should be いっしょに (with small っ). The っ indicates a double consonant — without it the word is unrecognizable. [Medium]
- Overall good level. Natural use of が for contrast (べんきょうしますが、うちは しずかじゃ ありません) and appropriate question forms (なんじから なんじまでですか).`
];

// ── State ──────────────────────────────────────────────────────────
let apiKey = "";
let modelId = "";
let conversationHistory = []; // {role, content}
let systemPrompt = "";
let phase = ""; // "A", "B", "C"
let studentWord = null;
let aiWord = null;
let grammarRule = null;
let grammarSide = ""; // "student" or "ai"
let finished = false;
let tokensIn = 0;
let tokensOut = 0;

// ── Session state persistence (survives mobile tab eviction) ───────
const SESSION_KEY = "jp_sparring_session";

function saveSession() {
  const state = {
    conversationHistory,
    systemPrompt,
    phase,
    studentWord,
    aiWord,
    grammarRule,
    grammarSide,
    finished,
    tokensIn,
    tokensOut,
    messages: messagesDiv.innerHTML
  };
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(state));
}

function restoreSession() {
  try {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    conversationHistory = state.conversationHistory;
    systemPrompt = state.systemPrompt;
    phase = state.phase;
    studentWord = state.studentWord;
    aiWord = state.aiWord;
    grammarRule = state.grammarRule;
    grammarSide = state.grammarSide;
    finished = state.finished;
    tokensIn = state.tokensIn || 0;
    tokensOut = state.tokensOut || 0;
    messagesDiv.innerHTML = state.messages;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    updateTokenDisplay();
    if (studentWord) {
      document.getElementById("student-word-hint").textContent = 'Your word: "' + studentWord.english + '"';
    }

    // Restore API key and model from localStorage
    apiKey = loadCached(KEY_STORAGE, KEY_TTL);
    modelId = loadCached(MODEL_STORAGE, MODEL_TTL) || "google/gemini-2.5-flash-preview";

    setupDiv.style.display = "none";
    chatContainer.style.display = "flex";
    if (!finished && phase === "B") setInputEnabled(true);
    return true;
  } catch { return false; }
}

function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
}

// ── Helpers ────────────────────────────────────────────────────────
function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickTwoWords() {
  const keys = Object.keys(VOCAB);
  const i1 = Math.floor(Math.random() * keys.length);
  let i2 = i1;
  while (i2 === i1) i2 = Math.floor(Math.random() * keys.length);
  return [
    { kana: keys[i1], english: VOCAB[keys[i1]] },
    { kana: keys[i2], english: VOCAB[keys[i2]] }
  ];
}

// ── API Key caching (localStorage, 24h TTL) ────────────────────────
const KEY_STORAGE = "jp_sparring_apikey";
const MODEL_STORAGE = "jp_sparring_model";
const KEY_TTL = 24 * 60 * 60 * 1000;
const MODEL_TTL = 7 * 24 * 60 * 60 * 1000;

function loadCached(storageKey, ttl) {
  try {
    const raw = localStorage.getItem(storageKey);
    if (!raw) return "";
    const { value, ts } = JSON.parse(raw);
    if (Date.now() - ts > ttl) { localStorage.removeItem(storageKey); return ""; }
    return value;
  } catch { return ""; }
}

function cache(storageKey, value) {
  localStorage.setItem(storageKey, JSON.stringify({ value, ts: Date.now() }));
}

// ── DOM refs ───────────────────────────────────────────────────────
const setupDiv = document.getElementById("setup");
const chatContainer = document.getElementById("chat-container");
const messagesDiv = document.getElementById("messages");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const apiKeyInput = document.getElementById("api-key");
const modelInput = document.getElementById("model-id");
const startBtn = document.getElementById("start-btn");

const newRoundBtn = document.getElementById("new-round-btn");
const tokensInEl = document.getElementById("tokens-in");
const tokensOutEl = document.getElementById("tokens-out");
const costEl = document.getElementById("cost-estimate");

function updateTokenDisplay() {
  tokensInEl.textContent = tokensIn;
  tokensOutEl.textContent = tokensOut;
  const cost = (tokensIn / 1e6) * 2.5 + (tokensOut / 1e6) * 25;
  costEl.textContent = cost.toFixed(4);
}

// Prefill cached values
apiKeyInput.value = loadCached(KEY_STORAGE, KEY_TTL);
modelInput.value = loadCached(MODEL_STORAGE, MODEL_TTL) || "google/gemini-2.5-flash-preview";

// Try to restore a previous session (survives mobile tab eviction)
if (!restoreSession()) {
  // No session to restore — show setup screen (default)
}

// ── UI helpers ─────────────────────────────────────────────────────
function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addSpinner() {
  const div = document.createElement("div");
  div.className = "msg assistant";
  div.id = "spinner-msg";
  div.innerHTML = '<span class="spinner"></span> Thinking...';
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function removeSpinner() {
  const el = document.getElementById("spinner-msg");
  if (el) el.remove();
}

function setInputEnabled(enabled) {
  userInput.disabled = !enabled;
  sendBtn.disabled = !enabled;
  if (enabled) userInput.focus();
}

// ── OpenRouter API call ────────────────────────────────────────────
async function callLLM(messages) {
  const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey,
    },
    body: JSON.stringify({
      model: modelId,
      messages: messages
    })
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error("OpenRouter error " + resp.status + ": " + err);
  }
  const data = await resp.json();
  if (data.usage) {
    tokensIn += data.usage.prompt_tokens || 0;
    tokensOut += data.usage.completion_tokens || 0;
    updateTokenDisplay();
  }
  return data.choices[0].message.content;
}

// ── Build system prompt ────────────────────────────────────────────
function buildSystemPrompt() {
  const grammarOwner = grammarSide === "ai" ? "YOU (the AI)" : "the STUDENT";

  return `You are a Japanese conversation practice partner for a beginner learner studying Minna no Nihongo (chapters 1-10).

You are Speaker B. The student is Speaker A.

RULES:
- Use ONLY vocabulary and grammar appropriate for Minna no Nihongo chapters 1-10.
- During the conversation phase, you must speak ONLY in Japanese, written entirely in kana (hiragana and katakana). No kanji, no romaji.
- You may ask clarifying questions in Japanese (e.g. わかりませんでした).
- Do NOT reveal or explicitly mention the target vocabulary or grammar rule.
- NEVER speak as Speaker A or put words in the student's mouth. You are ONLY Speaker B. If you cannot understand the student's input, respond as Speaker B would — ask for clarification in Japanese.

YOUR SECRET TARGETS (do not reveal these to the student):
- Your assigned word: "${aiWord.kana}" (${aiWord.english}) — you must naturally use this word during the conversation.
- Grammar rule: "${grammarRule}" — ${grammarOwner} must naturally use this grammar pattern during the conversation.
- The student's assigned word: "${studentWord.kana}" (${studentWord.english}) — the student must naturally use this word. Do not use it yourself or hint at it directly. Design the scenario so that it can emerge naturally.

PHASES:
When asked to create a scenario, provide IN ENGLISH:
1. Who Speaker A (the student) and Speaker B (you) are
2. The situation
3. Any prior context (what has already been said or happened)
4. A clear GOAL/INTENT for the student (what they need to accomplish in the conversation, e.g. "You want to find out where the nearest post office is")
5. Who speaks first

IMPORTANT: If you (Speaker B) speak first, you MUST include your opening line in kana-only Japanese at the end of the scenario description, after a blank line.

IMPORTANT: The student's goal must be fully achievable using only Minna no Nihongo chapters 1-10 vocabulary and grammar. Do not create goals that would require vocabulary or grammar beyond this level.

When in conversation mode, respond naturally in kana-only Japanese. Keep responses concise (1-3 sentences).
You may add short stage directions in English in square brackets to describe non-verbal context (e.g. [points at a building across the street], [holds up a magazine], [sounds of music from the next room]). Use these only when needed for clarity.

HELP TRIGGER: If the student writes "I am lost.", switch to English and:
1. Summarize what has been said so far in the conversation
2. Explain what Speaker B just said or asked
3. Suggest what Speaker A could say next (without revealing target words)
Then repeat or rephrase your last line in Japanese to get back on track.
--- Help trigger example (for format reference only) ---
A: I am lost.
B: [In English] Here's what happened so far:
- I (Speaker B) asked if you like sports.
- You said yes and asked what sport I like.
- I said I like soccer and asked if you want to play on Saturday.

You could respond by saying whether Saturday works for you, or suggest a different day.

[Back to Japanese]
どようびは どうですか。
--- End of help trigger example ---

When you determine that both secret words have been used and the grammar rule has appeared naturally from the correct side, announce completion in English and briefly summarize what was covered.

When asked for feedback, provide it in English: assess the student's grammar, vocabulary usage, and naturalness.

The student may also use [square brackets] for stage directions describing actions or context (e.g. [points at the menu], [looks around]). Treat these as non-verbal context, not spoken Japanese.

--- The following is a FULL EXAMPLE of a complete session for format and tone reference. Do NOT copy this scenario. Create a new, different scenario. ---
${randomPick(EXAMPLES)}
--- End of example ---`;
}

// ── Phase A: Generate scenario ─────────────────────────────────────
async function startScenario() {
  const [w1, w2] = pickTwoWords();
  studentWord = w1;
  aiWord = w2;
  grammarRule = randomPick(GRAMMAR);
  grammarSide = Math.random() < 0.5 ? "student" : "ai";

  systemPrompt = buildSystemPrompt();
  conversationHistory = [];
  document.getElementById("student-word-hint").textContent = 'Your word: "' + studentWord.english + '"';

  const phaseAMessage = "Create a conversation scenario for practice. Describe the situation, the two speakers, any prior context, the student's goal, and who goes first. Write this in English. Do not mention specific vocabulary or grammar targets.";

  addSpinner();
  try {
    const response = await callLLM([
      { role: "system", content: systemPrompt },
      { role: "user", content: phaseAMessage }
    ]);
    removeSpinner();
    addMessage("assistant", response);

    // Store the scenario as the first assistant message in history
    conversationHistory.push({ role: "assistant", content: response });

    phase = "B";
    saveSession();
    setInputEnabled(true);
  } catch (e) {
    removeSpinner();
    addMessage("system-info", "Error: " + e.message);
  }
}

// ── Phase B: Conversation turn ─────────────────────────────────────
async function sendConversationTurn(userText) {
  conversationHistory.push({ role: "user", content: userText });
  addMessage("user", userText);

  const taskReminder = "[SYSTEM REMINDER: Continue the conversation naturally in kana-only Japanese. Your goal: naturally incorporate your assigned word and ensure the grammar rule is used by the correct side. Once both target words have appeared and the grammar rule has been used from the correct side, announce completion in English and summarize. Do not force the targets — let them emerge naturally.]";

  const messages = [
    { role: "system", content: systemPrompt },
    ...conversationHistory,
    { role: "user", content: taskReminder }
  ];

  setInputEnabled(false);
  addSpinner();

  try {
    const response = await callLLM(messages);
    removeSpinner();
    addMessage("assistant", response);
    conversationHistory.push({ role: "assistant", content: response });

    saveSession();

    // Check if AI declared completion (heuristic: contains English completion markers)
    if (response.match(/complet|well done|great job|conversation goal|targets.*covered|covered.*target|all.*target/i) && response.length > 50 && /[a-zA-Z]{10,}/.test(response)) {
      phase = "C";
      await requestFeedback();
      return;
    }

    setInputEnabled(true);
  } catch (e) {
    removeSpinner();
    addMessage("system-info", "Error: " + e.message);
    setInputEnabled(true);
  }
}

// ── Phase C: Feedback ──────────────────────────────────────────────
async function requestFeedback() {
  const feedbackPrompt = `Provide detailed feedback in English on the student's performance in this conversation. Assess:
1. Grammar accuracy
2. Vocabulary usage and naturalness
3. How well they achieved their conversation goal
4. Specific suggestions for improvement

Also reveal: the student's target word was "${studentWord.kana}" (${studentWord.english}), your target word was "${aiWord.kana}" (${aiWord.english}), and the grammar rule was "${grammarRule}" (assigned to: ${grammarSide}).`;

  const messages = [
    { role: "system", content: systemPrompt },
    ...conversationHistory,
    { role: "user", content: feedbackPrompt }
  ];

  addSpinner();
  try {
    const response = await callLLM(messages);
    removeSpinner();
    addMessage("system-info", response);
    finished = true;
    addMessage("system-info", "Session complete. Press 'New' for a new round.");
    saveSession();
  } catch (e) {
    removeSpinner();
    addMessage("system-info", "Error getting feedback: " + e.message);
  }
}

// ── Event handlers ─────────────────────────────────────────────────
startBtn.addEventListener("click", () => {
  apiKey = apiKeyInput.value.trim();
  modelId = modelInput.value.trim();
  if (!apiKey) { alert("Please enter your OpenRouter API key."); return; }
  if (!modelId) { alert("Please enter a model ID."); return; }
  cache(KEY_STORAGE, apiKey);
  cache(MODEL_STORAGE, modelId);
  setupDiv.style.display = "none";
  chatContainer.style.display = "flex";
  phase = "A";
  startScenario();
});

sendBtn.addEventListener("click", () => {
  const text = userInput.value.trim();
  if (!text || finished) return;
  userInput.value = "";
  if (phase === "B") sendConversationTurn(text);
});

newRoundBtn.addEventListener("click", () => {
  clearSession();
  location.reload();
});

// ── Save with rating ──────────────────────────────────────────────
const saveBtn = document.getElementById("save-btn");
const ratingOverlay = document.getElementById("rating-overlay");
const ratingCancel = document.getElementById("rating-cancel");
let selectedRating = 0;

document.querySelectorAll(".rating-stars button").forEach(btn => {
  btn.addEventListener("click", () => {
    selectedRating = parseInt(btn.dataset.rating);
    document.querySelectorAll(".rating-stars button").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    downloadConversation(selectedRating);
    ratingOverlay.classList.remove("active");
  });
});

ratingCancel.addEventListener("click", () => {
  ratingOverlay.classList.remove("active");
});

saveBtn.addEventListener("click", () => {
  if (conversationHistory.length === 0) return;
  selectedRating = 0;
  document.querySelectorAll(".rating-stars button").forEach(b => b.classList.remove("selected"));
  ratingOverlay.classList.add("active");
});

function downloadConversation(rating) {
  const data = {
    timestamp: new Date().toISOString(),
    model: modelId,
    rating: rating,
    targets: {
      studentWord: studentWord,
      aiWord: aiWord,
      grammarRule: grammarRule,
      grammarSide: grammarSide
    },
    tokens: { in: tokensIn, out: tokensOut },
    systemPrompt: systemPrompt,
    conversationHistory: conversationHistory
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "jp_sparring_" + new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-") + "_r" + rating + ".json";
  a.click();
  URL.revokeObjectURL(url);
}

userInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});
</script>
